services:
  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:3001
    depends_on:
      - api

  api:
    build:
      context: ./api
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: password
      DB_NAME: app
      JWT_SECRET: dev-secret
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: app
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /e2e
    volumes:
      - ./e2e:/e2e
    depends_on:
      - web
    command: >
      sh -c "npm ci && npx playwright test"
    profiles:
      - test

volumes:
  mysql_data:
